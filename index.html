<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PulseFit — Vida Saudável na Juventude</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#f7fbff 0%,#eef5ff 42%,#f4fff8 100%);color:#1a2340;min-height:100vh}
:root{
  --primary:#1a5fd4;--card:#fff;--border:#dce6f5;
  --muted:#e8eef8;--muted-fg:#6b7fa3;--secondary:#eaf0fb;
  --orange:#f97316;--green:#22c55e;--blue:#3b82f6;
}
#app{display:flex;flex-direction:column;min-height:100vh;background:radial-gradient(circle at 12% 18%,rgba(34,197,94,.09),transparent 28%),radial-gradient(circle at 86% 12%,rgba(59,130,246,.1),transparent 30%),linear-gradient(135deg,#f8fbff,#edf5ff 48%,#f7fff9)}
header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 1.5rem;justify-content:space-between;box-shadow:0 1px 4px #0001}
.logo-box{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.9rem}
.logo-text{font-weight:700;color:var(--primary);font-size:.9rem}
.logo-sub{font-size:.65rem;color:var(--muted-fg)}
.header-right{display:flex;align-items:center;gap:8px}
.xp-badge{display:flex;align-items:center;gap:6px;background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:4px 10px;font-size:.75rem;font-weight:700;color:#a16207}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;overflow:hidden;border:2px solid #fff;box-shadow:0 2px 8px #0002}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
nav.sidebar{position:fixed;top:56px;left:0;bottom:0;width:64px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;z-index:50}
.nav-btn{width:42px;height:42px;border-radius:12px;border:none;background:none;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;position:relative;transition:.2s}
.nav-btn:hover{background:var(--secondary)}
.nav-btn.active{background:rgba(26,95,212,.12);color:var(--primary)}
.nav-tooltip{position:absolute;left:54px;background:#1a2340;color:#fff;font-size:.7rem;padding:3px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s}
.nav-btn:hover .nav-tooltip{opacity:1}
nav.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:50;padding:6px 4px;grid-template-columns:repeat(5,1fr);gap:2px}
.bnav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 2px;border-radius:10px;font-size:.5rem;color:var(--muted-fg);transition:.2s;height:42px}
.bnav-btn span.icon{font-size:1.1rem;line-height:1}
.bnav-btn.active{background:rgba(26,95,212,.1);color:var(--primary)}
main{margin-top:56px;margin-left:64px;min-height:100vh;padding:24px}
.page-inner{max-width:1100px;margin:0 auto}
.card{background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 6px 24px rgba(26,95,212,.06)}
.card-title{font-size:.7rem;font-weight:700;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;cursor:pointer;font-weight:600;font-size:.85rem;padding:10px 18px;transition:.15s;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:none;border:1px solid var(--border);color:#1a2340}.btn-outline:hover{background:var(--secondary)}
.btn-ai{background:none;border:1px solid rgba(26,95,212,.3);color:var(--primary)}.btn-ai:hover{background:rgba(26,95,212,.06)}
.btn-danger{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:10px}
.w-full{width:100%}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-5{margin-top:20px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.space-y-2>*+*{margin-top:8px}.space-y-3>*+*{margin-top:12px}
.input{width:100%;padding:10px 16px;border-radius:12px;border:1px solid var(--border);background:var(--secondary);font-family:inherit;font-size:.85rem;color:#1a2340;outline:none;transition:.15s}
.input:focus{border-color:var(--primary)}
label.field-label{display:block;font-size:.7rem;font-weight:700;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.select{width:100%;padding:10px 16px;border-radius:12px;border:1px solid var(--border);background:var(--secondary);font-family:inherit;font-size:.85rem;color:#1a2340;outline:none}
.badge-ai{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:linear-gradient(90deg,rgba(26,95,212,.1),rgba(168,85,247,.1));border:1px solid rgba(26,95,212,.2);color:var(--primary);font-size:.65rem;font-weight:700}
.badge-green{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-yellow{background:#fefce8;border:1px solid #fde68a;color:#a16207;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-red{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-orange{background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px}
.xp-bar-wrap{background:var(--secondary);border-radius:12px;padding:12px;border:1px solid var(--border)}
.xp-bar-track{height:8px;background:var(--muted);border-radius:99px;overflow:hidden;margin-top:6px}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#facc15,#f97316);transition:width .8s ease}
.progress-track{height:6px;background:var(--muted);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .6s ease}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden;box-shadow:0 1px 3px #0001}
.stat-card-bar{position:absolute;top:0;left:0;right:0;height:3px}
.stat-value{font-weight:700;font-size:1.6rem;color:#1a2340}
.stat-label{font-size:.7rem;color:var(--muted-fg);margin-top:2px}
.stat-sub{font-size:.7rem;font-weight:600;margin-top:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:440px;box-shadow:0 8px 32px #0003;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted-fg)}
#toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--primary);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:.85rem;box-shadow:0 4px 16px #0003;display:none;max-width:300px}
.onboarding-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#dbeafe,#f0f4ff,#dcfce7);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.onboarding-card{background:var(--card);border-radius:24px;box-shadow:0 8px 40px #0003;width:100%;max-width:460px;overflow:hidden}
.onboarding-header{background:linear-gradient(135deg,var(--primary),#3b82f6);padding:24px;color:#fff}
.onboarding-body{padding:24px}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tipo-btn{border:2px solid var(--border);border-radius:16px;padding:14px;text-align:center;cursor:pointer;background:var(--secondary);transition:.2s}
.tipo-btn:hover{border-color:rgba(26,95,212,.4)}
.tipo-btn.selected{border-color:var(--primary);background:rgba(26,95,212,.06)}
.tipo-btn span.ti{font-size:1.6rem;display:block;margin-bottom:4px}
.tipo-btn strong{font-size:.82rem;display:block}
.tipo-btn small{font-size:.68rem;color:var(--muted-fg)}
.tipo-card-img{width:70px;height:70px;margin:0 auto 8px;border-radius:18px;background:#edf5ff;border:1px solid #bfdbfe;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(26,95,212,.1)}
.tipo-card-img svg{width:54px;height:54px;stroke:var(--primary);stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.school-picker{display:grid;grid-template-columns:1fr;gap:10px}
.profile-photo-box{display:flex;align-items:center;gap:14px;padding:12px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(135deg,#eff6ff,#f8fbff)}
.profile-photo-preview{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#22c55e);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.5rem;overflow:hidden;border:3px solid #fff;box-shadow:0 4px 16px #0002;flex-shrink:0}
.profile-photo-preview img{width:100%;height:100%;object-fit:cover;display:block}
.level-pill{display:inline-flex;flex-direction:column;gap:1px;border:1px solid rgba(26,95,212,.2);background:linear-gradient(135deg,#eff6ff,#f0fdf4);border-radius:14px;padding:8px 12px;min-width:180px}
.level-pill strong{font-size:.82rem;color:var(--primary)}
.level-pill small{font-size:.68rem;color:var(--muted-fg);line-height:1.2}
.food-game-card{background:linear-gradient(135deg,#f0fdf4,#eff6ff);border:1px solid #bfdbfe;border-radius:16px;padding:16px}
.mini-chart{display:flex;align-items:end;gap:8px;height:92px;padding:10px 8px;border-radius:14px;background:rgba(255,255,255,.65);border:1px solid var(--border)}
.mini-bar{flex:1;border-radius:10px 10px 4px 4px;min-height:12px;background:linear-gradient(180deg,#22c55e,#3b82f6);position:relative}
.mini-bar span{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:.62rem;color:var(--muted-fg);font-weight:700}
.xp-chip{display:inline-flex;align-items:center;gap:4px;background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;border-radius:99px;padding:3px 8px;font-size:.68rem;font-weight:800}
.activity-card{display:flex;align-items:center;gap:12px;border:1px solid var(--border);background:linear-gradient(135deg,#fff,#f8fbff);border-radius:16px;padding:12px}
.activity-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;background:#eff6ff;border:1px solid #bfdbfe;flex-shrink:0}
.meal-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--secondary)}
.meal-item.done{opacity:.55;background:#f0fdf4;border-color:#bbf7d0}
.meal-item-icon{font-size:1.3rem}
.meal-item-info{flex:1;min-width:0}
.meal-item-info strong{font-size:.85rem;display:block}
.meal-item-info small{font-size:.72rem;color:var(--muted-fg)}
.meal-item .check-btn{background:none;border:none;font-size:1.1rem;cursor:pointer}
.meal-item .del-btn{background:none;border:none;cursor:pointer;color:var(--muted-fg);font-size:.85rem}
.meal-item .del-btn:hover{color:#dc2626}
.ex-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--secondary)}
.ex-icon-box{width:40px;height:40px;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.water-glass-wrap{position:relative;margin:0 auto 20px;width:100px;height:140px}
.water-level-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:2rem;color:var(--primary)}
.water-level-text small{font-size:.7rem;font-weight:400;color:var(--muted-fg)}
.drop-btn{background:none;border:none;cursor:pointer;font-size:1.4rem;transition:.2s;filter:grayscale(1);opacity:.25}
.drop-btn.filled{filter:none;opacity:1}
.imc-gradient{height:16px;border-radius:99px;background:linear-gradient(to right,#60a5fa,#34d399,#fbbf24,#f97316,#ef4444);position:relative;margin-bottom:4px}
.imc-pointer{position:absolute;top:0;height:16px;width:3px;background:#fff;border-radius:99px;box-shadow:0 0 4px #0004;transform:translateX(-50%);transition:left .6s ease}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;border-radius:16px;border:1px solid var(--border);text-align:center}
.badge-item.earned{background:#fefce8;border-color:#fde68a}
.badge-item span.bi{font-size:1.8rem}
.badge-item small{font-size:.65rem;font-weight:600;line-height:1.2}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--secondary)}
.rank-item.me{background:rgba(26,95,212,.06);border-color:rgba(26,95,212,.25)}
.rank-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.8rem;flex-shrink:0}
.levels-row{display:flex;align-items:center;gap:4px;overflow-x:auto;padding-bottom:8px}
.level-node{flex-shrink:0;min-width:80px;padding:10px 8px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.4);text-align:center;opacity:.5}
.level-node.reached{background:rgba(26,95,212,.06);border-color:rgba(26,95,212,.3);opacity:1}
.level-connector{flex-shrink:0;height:2px;width:20px;background:var(--muted)}
.level-connector.reached{background:var(--primary)}
.streak-day{flex:1;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;background:var(--muted);color:var(--muted-fg)}
.streak-day.today{background:var(--primary);color:#fff}
.streak-day.done{background:#dcfce7;color:#15803d}
.tip-card{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid var(--border);border-radius:12px;padding:14px}
.ai-tip-box{background:linear-gradient(90deg,rgba(26,95,212,.06),#eff6ff);border:1px solid rgba(26,95,212,.2);border-radius:16px;padding:14px;display:flex;align-items:flex-start;gap:12px}
.ai-tip-icon{width:32px;height:32px;background:rgba(26,95,212,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem}
.mission-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--secondary);cursor:pointer;text-align:left;width:100%}
.mission-item.done{background:#f0fdf4;border-color:#bbf7d0;cursor:default}
.page-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.page-title h1{font-weight:700;font-size:1.5rem}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.analysis-item{padding:12px;border-radius:12px;border:1px solid;text-align:center}
.analysis-item.ok{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}
.analysis-item.warn{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
.reminder-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--secondary)}
.benefit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.benefit-card{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px}
.food-tag-green{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;border-radius:20px;font-size:.65rem;font-weight:700;padding:2px 8px}
.food-tag-yellow{background:#fefce8;color:#a16207;border:1px solid #fde68a;border-radius:20px;font-size:.65rem;font-weight:700;padding:2px 8px}
.food-tag-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:20px;font-size:.65rem;font-weight:700;padding:2px 8px}
.border-top-green{border-top:4px solid #4ade80}
.border-top-blue{border-top:4px solid #60a5fa}
.border-top-orange{border-top:4px solid #fb923c}
/* ESCOLA PAINEL */
.aluno-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--secondary);cursor:pointer;transition:.2s}
.aluno-row:hover{border-color:rgba(26,95,212,.3);background:#eff6ff}
.aluno-row.selected{border-color:var(--primary);background:rgba(26,95,212,.06)}
.aluno-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.9rem;flex-shrink:0}
@media(max-width:768px){
  nav.sidebar{display:none}
  nav.bottom-nav{display:grid}
  main{margin-left:0;padding:12px;margin-bottom:104px}
  .grid4{grid-template-columns:1fr 1fr}
  .grid3{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
}
@media(max-width:480px){.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.text-xs{font-size:.75rem}.text-sm{font-size:.85rem}
.font-bold{font-weight:700}.font-semibold{font-weight:600}
.text-primary{color:var(--primary)}.text-muted{color:var(--muted-fg)}.text-orange{color:var(--orange)}
.text-green{color:#15803d}.text-red{color:#dc2626}
.hidden{display:none}.relative{position:relative}.text-center{text-align:center}
.overflow-y-auto{overflow-y:auto;max-height:360px}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div class="onboarding-overlay" id="login-screen" style="display:none">
  <div class="onboarding-card">
    <div class="onboarding-header">
      <div class="flex items-center gap-3" style="margin-bottom:10px">
        <div style="width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem">🌱</div>
        <div><div style="font-weight:700;font-size:1.1rem">PulseFit</div><div style="font-size:.8rem;color:rgba(255,255,255,.8)">Vida Saudável na Juventude</div></div>
      </div>
      <p style="font-size:.85rem;color:rgba(255,255,255,.8)">Entre ou crie sua conta</p>
    </div>
    <div class="onboarding-body" id="login-body"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="logo-box">
      <div class="logo-icon">P</div>
      <div><div class="logo-text">PulseFit</div><div class="logo-sub">Vida Saudável na Juventude</div></div>
    </div>
    <div class="header-right">
      <div class="xp-badge" id="header-xp">🌱 Iniciante · 0 XP</div>
      <div class="avatar" id="header-avatar" onclick="navigate('perfil')" title="Perfil">A</div>
    </div>
  </header>
  <nav class="sidebar" id="sidebar"></nav>
  <nav class="bottom-nav" id="bottom-nav"></nav>
  <main><div class="page-inner" id="page-content"></div></main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-meal">
  <div class="modal-box">
    <div class="modal-header"><h3>🍽️ Nova Refeição</h3><button class="modal-close" onclick="closeModal('modal-meal')">×</button></div>
    <div class="space-y-3">
      <div><label class="field-label">Nome</label><input class="input" id="m-nome" placeholder="Ex: Café da manhã"></div>

// ============================================================
// AUTH — contas persistidas, state separado por userId
// ============================================================
const AUTH_KEY = 'pf_auth_v3';
let AUTH = { contas:[], logado:null };
let authMode = 'login';
let authTipo = 'aluno';

function userKey(uid){ return 'pf_state_' + uid; }

function loadAuth(){
  try{ AUTH = JSON.parse(localStorage.getItem(AUTH_KEY)) || {contas:[],logado:null}; }
  catch(e){ AUTH = {contas:[],logado:null}; }
}
function saveAuth(){ localStorage.setItem(AUTH_KEY, JSON.stringify(AUTH)); }
function me(){ return AUTH.contas.find(c => c.id === AUTH.logado) || null; }

// ============================================================
// STATE — por usuário logado
// ============================================================
let S = {};
function defaultState(){
  return { refeicoes:[], exercicios:[], pesos:[], agua:0, streak:0,
    streakDays:[false,false,false,false,false,false,false],
    xp:0, badges:[], missoesConcluidas:[], perfil:{} };
}
function loadState(){
  const c = me();
  if(!c){ S = defaultState(); return; }
  try{
    const raw = localStorage.getItem(userKey(c.id));
    const s = raw ? JSON.parse(raw) : {};
    S = {
      refeicoes: s.refeicoes||[], exercicios: s.exercicios||[],
      pesos: s.pesos||[], agua: s.agua||0,
      streak: s.streak||0, streakDays: s.streakDays||[false,false,false,false,false,false,false],
      xp: s.xp||0, badges: s.badges||[], missoesConcluidas: s.missoesConcluidas||[],
      perfil: s.perfil || buildPerfilFromConta(c)
    };
  } catch(e){ S = defaultState(); }
}
function saveState(){
  const c = me();
  if(!c) return;
  localStorage.setItem(userKey(c.id), JSON.stringify(S));
}

function atualizarEscolaSelect(prefix){
  const estadoEl = document.getElementById(prefix+'-estado');

  if(!estadoEl || !cidadeEl || !escolaEl) return;
  const estado = estadoEl.value;
  const cidadeAtual = cidadeEl.value;
  const cidades = estado ? Object.keys(ESCOLAS_CADASTRADAS[estado] || {}) : [];
  cidadeEl.disabled = !estado;
  cidadeEl.innerHTML = '<option value="">Selecione a cidade</option>' + cidades.map(c=>`<option value="${c}" ${cidadeAtual===c?'selected':''}>${c}</option>`).join('');

  cidadeEl.value = cidade;
  const escolas = estado && cidade ? (ESCOLAS_CADASTRADAS[estado][cidade] || []) : [];

function buildPerfilFromConta(c){
  if(!c) return {};
  const d = c.dados || {};

    const metas = calcMacros(d.peso||55, d.altura||160, d.birthdate||'', 'M', d.objetivo||'saude', 1.375);
    return {

      birthdate: d.birthdate||'', altura: d.altura||160, peso: d.peso||55,
      sexo:'M', estado:d.estado||'', cidade:d.cidade||'', escola: d.escola||'', serie: d.serie||'', objetivo: d.objetivo||'saude',
      atividade:1.375, meta:metas.tdee, metaProt:metas.prot, metaCarb:metas.carb,
      metaGord:metas.gord, waterGoal: calcWaterGoal(d.peso||55, d.birthdate||''),
      pesoMeta: Math.max(40,(d.peso||55)-5)
    };
  }
  return { nome:c.nome, tipo:c.tipo };
}

function cadastrar(){
  const nome = (document.getElementById('c-nome')||{}).value?.trim();
  const user = (document.getElementById('c-user')||{}).value?.trim().toLowerCase();
  const pass = (document.getElementById('c-pass')||{}).value?.trim();
  if(!nome||!user||!pass){ showToast('❌ Preencha nome, usuário e senha.'); return; }
  if(pass.length<4){ showToast('❌ Senha precisa ter pelo menos 4 caracteres.'); return; }
  if(AUTH.contas.some(c=>c.login===user)){ showToast('❌ Esse usuário já existe. Escolha outro.'); return; }
  const conta = { id: Date.now().toString(), tipo:authTipo, nome, login:user, senha:pass, dados:{} };
  if(authTipo==='aluno'){
    conta.dados = {
      birthdate: document.getElementById('c-bd').value,
      altura: +(document.getElementById('c-alt').value)||160,
      peso: +(document.getElementById('c-peso').value)||55,
      escola: document.getElementById('c-escola').value.trim(),
      serie: document.getElementById('c-serie').value,
      objetivo: document.getElementById('c-obj').value,
    };
  }
  if(authTipo==='responsavel'){
    conta.dados.email = document.getElementById('c-email').value.trim();
    conta.dados.filhosLogins = document.getElementById('c-filhos').value.split(',').map(f=>f.trim().toLowerCase()).filter(Boolean);
  }
  if(authTipo==='colaborador'){
    conta.dados.funcao = document.getElementById('c-funcao').value.trim();
    conta.dados.escolaUser = document.getElementById('c-escola-user').value.trim().toLowerCase();
  }
  if(authTipo==='escola'){
    conta.dados.escolaNome = document.getElementById('c-escola-nome').value.trim();
    conta.dados.cnpj = document.getElementById('c-cnpj').value.trim();
    conta.dados.email = document.getElementById('c-email').value.trim();
  }
  AUTH.contas.push(conta);
  AUTH.logado = conta.id;
  saveAuth();
  loadState();
  // garante state inicial para aluno
  if(authTipo==='aluno') saveState();
  showToast('✅ Conta criada! Bem-vindo, '+nome+'!');
  iniciarApp();
}

function entrar(){
  const user = (document.getElementById('li-user')||{}).value?.trim().toLowerCase();
  const pass = (document.getElementById('li-pass')||{}).value?.trim();
  if(!user||!pass){ showToast('❌ Preencha usuário e senha.'); return; }
  const conta = AUTH.contas.find(c=>c.login===user && c.senha===pass);
  if(!conta){ showToast('❌ Usuário ou senha incorretos.'); return; }
  AUTH.logado = conta.id;
  saveAuth();
  loadState();
  showToast('👋 Bem-vindo de volta, '+conta.nome+'!');
  iniciarApp();
}

function sair(){
  AUTH.logado = null;
  saveAuth();
  S = defaultState();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  authMode='login';
  renderLogin();
}

function iniciarApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  selectedObj = (S.perfil&&S.perfil.objetivo)||'saude';
  updateHeader();
  buildNav();
  renderPage();
}

// ============================================================
// CALCULATIONS
// ============================================================
function calcAge(bd){
  if(!bd) return 12;
  const t=new Date(),b=new Date(bd);
  let a=t.getFullYear()-b.getFullYear();
  const m=t.getMonth()-b.getMonth();
  if(m<0||(m===0&&t.getDate()<b.getDate())) a--;
  return Math.max(1,a);
}
function calcTDEE(peso,altura,bd,sexo,atv){
  const age=calcAge(bd), a=atv||1.375;
  const bmr = sexo==='F'
    ? 10*peso+6.25*altura-5*age-161
    : 10*peso+6.25*altura-5*age+5;
  return Math.round(bmr*a);
}
function calcMacros(peso,altura,bd,sexo,obj,atv){
  const tdee=calcTDEE(peso,altura,bd,sexo,atv);
  const pf={Crescimento:1.6,saúde:1.4,Equilíbrio:1.6,Deslocamento :1.4,Exercício:1.8};
  const prot=Math.round((pf[obj]||1.4)*peso);
  const gord=Math.round(tdee*0.27/9);
  const carb=Math.round(Math.max(100,(tdee-prot*4-gord*9)/4));
  return {tdee,prot,carb,gord};
}
function calcWaterGoal(peso,bd){
  const age=calcAge(bd), f=age<10?40:age<14?38:35;
  return Math.round(Math.max(6,Math.min(12,peso*f/250)));
}
function getLevel(xp){
  const levels=[{min:0,name:'🌱 Iniciante'},{min:100,name:'🌿 Ativo'},{min:250,name:'⚡ Guerreiro'},{min:500,name:'💪 Campeão'},{min:1000,name:'🏆 Lenda'}];
  let lv=levels[0],nx=levels[1];
  for(let i=levels.length-1;i>=0;i--){ if(xp>=levels[i].min){lv=levels[i];nx=levels[i+1]||null;break;} }
  const pct=nx?Math.min(100,(xp-lv.min)/(nx.min-lv.min)*100):100;
  return {level:lv,next:nx,pct,levels};
}

function renderHidratacao(el){
  const p=S.perfil||{};
  const waterGoal=p.waterGoal||8;
  const pct=Math.min(100,(S.agua/waterGoal)*100);
  const fillY=160-(pct/100*140);
  const hour=new Date().getHours();
  let aiTip='✨ Faltam '+(waterGoal-S.agua)+' copos para a meta.';
  if(S.agua===0&&hour>9) aiTip='⚠️ Você ainda não bebeu água hoje!';
  else if(S.agua>=waterGoal) aiTip='🎉 Parabéns! Meta de hidratação atingida!';
  const dropsHTML=Array.from({length:waterGoal},(_,i)=>`<button class="drop-btn ${i<S.agua?'filled':''}" onclick="setAgua(${i+1})">💧</button>`).join('');
  const BENEFITS=[{icon:'🧠',title:'Mais concentração',desc:'Desidratação prejudica o foco.'},{icon:'⚡',title:'Mais energia',desc:'Água é o combustível das células.'},{icon:'🏃',title:'Melhor desempenho',desc:'Atletas hidratados rendem mais.'},{icon:'🌟',title:'Corpo saudável',desc:'Ajuda na digestão e temperatura.'}];
  el.innerHTML=`
    <div class="page-title"><h1>💧 <span class="text-primary">Hidratação</span></h1>
      <span class="badge-blue">${S.agua} / ${waterGoal} copos</span>
    </div>
    <div class="ai-tip-box"><div class="ai-tip-icon">✦</div><div>${aiBadge()}<p class="text-sm" style="margin-top:4px">${aiTip}</p></div></div>
    <div class="grid2 mt-4">
      <div class="card text-center">
        <div class="card-title">Copos hoje</div>
        <div class="water-glass-wrap">
          <svg width="100" height="140" viewBox="0 0 120 160" style="position:absolute;inset:0;width:100%;height:100%">
            <path d="M20 10 L10 150 L110 150 L100 10 Z" fill="none" stroke="#dce6f5" stroke-width="2.5" stroke-linejoin="round"/>
          </svg>
          <svg width="100" height="140" viewBox="0 0 120 160" style="position:absolute;inset:0;width:100%;height:100%;overflow:hidden">
            <clipPath id="gc"><path d="M21 12 L11 148 L109 148 L99 12 Z"/></clipPath>
            <rect x="0" y="${fillY}" width="120" height="160" fill="rgba(59,130,246,0.3)" clip-path="url(#gc)"/>
          </svg>
          <div class="water-level-text"><span>${S.agua}</span><small>copos</small></div>
        </div>
        <p class="text-xs text-muted mb-2">${S.agua*250} ml de ${waterGoal*250} ml</p>
        <div class="progress-track" style="margin:0 32px 16px"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,#60a5fa,#2563eb)"></div></div>
        <div style="display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:16px">${dropsHTML}</div>
        <div class="flex gap-2 justify-center">
          <button class="btn btn-primary" onclick="addAgua()">+ 1 copo</button>
          <button class="btn btn-outline" onclick="removeAgua()">−</button>
        </div>
      </div>
      <div class="card"><div class="card-title">Por que se hidratar?</div>
        <div class="benefit-grid">
          ${BENEFITS.map(b=>`<div class="benefit-card"><div style="font-size:1.3rem;margin-bottom:4px">${b.icon}</div><div style="font-weight:700;font-size:.78rem;margin-bottom:2px">${b.title}</div><div style="font-size:.68rem;color:var(--muted-fg);line-height:1.4">${b.desc}</div></div>`).join('')}
        </div>
      </div>
    </div>`;
}
function addAgua(){const wg=(S.perfil&&S.perfil.waterGoal)||8;if(S.agua>=wg+4){showToast('👏 Já passou muito da meta!');return;}S.agua++;addXP(5,'Hidratação');if(S.agua===wg)showToast('🎉 Meta de água atingida!');saveState();checkBadges();renderPage();}
function removeAgua(){if(S.agua<=0)return;S.agua--;saveState();renderPage();}
function setAgua(n){S.agua=n;saveState();checkBadges();renderPage();}

  const progressItems=[

      <button class="btn btn-primary" onclick="openModal('modal-peso');document.getElementById('p-data').value=new Date().toISOString().split('T')[0]">+ Peso</button>
    </div>
    <div class="grid3">

function addPeso(){
  const peso=document.getElementById('p-peso').value;
  if(!peso){showToast('❌ Informe o peso!');return;}
  S.pesos.unshift({peso:+peso,data:document.getElementById('p-data').value,obs:document.getElementById('p-obs').value});
  S.pesos=S.pesos.slice(0,30);
  addXP(10,'Peso registrado'); saveState(); checkBadges(); closeModal('modal-peso'); renderPage();
  document.getElementById('p-peso').value='';

}

    : ['Mantenha a rotina atual de alimentação equilibrada.','Continue priorizando alimentos naturais e variados.','Hidrate-se bem e mantenha a atividade física regular.','Monitore seu peso semanalmente para manter o equilíbrio.','Parabéns! Continue com os hábitos saudáveis.'];

  const recsTreino = status==='acima'
    ? ['Inicie com 20-30 min de caminhada rápida diária.','Adicione exercícios de resistência 2x por semana (agachamento, flexão).','Inclua atividades que você goste: dança, natação, esportes coletivos.','Aumente a intensidade gradualmente: substitua 10 min de caminhada por corrida.','Mantenha ao menos 150 min de atividade moderada por semana.']
    : ['Pratique exercícios leves para fortalecer a musculatura.','Inclua exercícios de força supervisionados para ganho de massa.','Priorize atividades de baixo impacto se estiver abaixo do peso.','Aumente o volume de treino gradualmente a cada semana.','Descanse bem: o crescimento muscular ocorre no repouso.'];

  el.innerHTML=`

      <div class="flex gap-2 items-center">
        ${aiBadge('Plano por IA')}
        <button class="btn btn-sm" style="background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;font-weight:700" onclick="gerarPDFProjecao()">📄 Baixar PDF</button>
      </div>
    </div>

    <!-- CARDS SITUAÇÃO -->
    <div class="grid4 mb-4">
      <div class="stat-card"><div class="stat-card-bar" style="background:var(--blue)"></div><div style="font-size:1.3rem">⚖️</div><div class="stat-value" style="font-size:1.3rem">${peso} kg</div><div class="stat-label">peso atual</div></div>
      <div class="stat-card"><div class="stat-card-bar" style="background:var(--green)"></div><div style="font-size:1.3rem">🎯</div><div class="stat-value" style="font-size:1.3rem">${pesoIdeal.toFixed(1)} kg</div><div class="stat-label">peso ideal</div></div>
      <div class="stat-card"><div class="stat-card-bar" style="background:${status==='normal'?'#4ade80':status==='acima'?'#fb923c':'#60a5fa'}"></div><div style="font-size:1.3rem">📐</div><div class="stat-value" style="font-size:1.3rem">${imc}</div><div class="stat-label">IMC</div></div>
      <div class="stat-card"><div class="stat-card-bar" style="background:#facc15"></div><div style="font-size:1.3rem">🔥</div><div class="stat-value" style="font-size:1.3rem">${tdee}</div><div class="stat-label">kcal/dia estimadas</div></div>

    <!-- STATUS GERAL -->
    <div class="ai-tip-box mb-4">
      <div class="ai-tip-icon">✦</div>
      <div>
        ${aiBadge('Análise personalizada')}
        <p class="text-sm" style="margin-top:4px">
          ${status==='normal'
            ? '✅ Você está no intervalo de peso saudável! Continue mantendo seus hábitos e monitore regularmente.'
            : status==='acima'
            ? `⚠️ Você está <strong>${diff} kg acima</strong> do peso ideal estimado. Com hábitos saudáveis, é possível alcançar o equilíbrio em 5 meses.`
            : `📉 Você está <strong>${Math.abs(parseFloat(diff)).toFixed(1)} kg abaixo</strong> do ideal. Foque em nutrição adequada para um crescimento saudável.`}
          ${age<18?' <strong>Lembre-se:</strong> você ainda está em desenvolvimento — consulte sempre um profissional de saúde!':''}
        </p>
      </div>
    </div>

    <div class="grid2">
      <!-- PLANO MENSAL -->
      <div class="card">
        <div class="card-title">📊 Projeção mês a mês</div>

          ?`<div style="text-align:center;padding:24px 0">
              <div style="font-size:2.5rem">✅</div>

                const acum=dist.slice(0,i+1).reduce((s,v)=>s+kgDiff*v,0).toFixed(1);
                const color=status==='acima'?'#fb923c':'#3b82f6';
                const mesIdx=(hoje.getMonth()+i+1)%12;
                const pesoMes=(status==='acima'?peso-parseFloat(acum):peso+parseFloat(acum)).toFixed(1);
                return `<div style="background:var(--secondary);border-radius:12px;padding:12px;border:1px solid var(--border)">
                  <div class="flex justify-between items-center mb-2">
                    <div>
                      <span class="text-xs font-bold">Mês ${i+1} — ${meses[mesIdx]}</span>
                      <span style="font-size:.68rem;color:var(--muted-fg);margin-left:6px">Peso estimado: <strong>${pesoMes} kg</strong></span>
                    </div>
                    <span style="font-size:.78rem;font-weight:700;color:${color}">${status==='acima'?'−':'+'} ${kg} kg</span>
                  </div>
                  <div class="progress-track"><div class="progress-fill" style="width:${Math.round((i+1)/dist.length*100)}%;background:${color}"></div></div>
                  <div style="font-size:.68rem;color:var(--muted-fg);margin-top:4px">Acumulado: ${acum} kg ${status==='acima'?'perdidos':'ganhos'}</div>
                </div>`;
              }).join('')}
              <div style="background:${status==='acima'?'#fff7ed':'#eff6ff'};border:1px solid ${status==='acima'?'#fed7aa':'#bfdbfe'};border-radius:12px;padding:12px;text-align:center">
                <div style="font-size:1.4rem">${status==='acima'?'🏆':'💪'}</div>
                <div style="font-weight:700;font-size:.9rem;margin-top:4px">Meta em 5 meses</div>
                <div style="font-size:.8rem;color:var(--muted-fg)">Peso estimado: <strong>${(status==='acima'?peso-kgDiff:peso+kgDiff).toFixed(1)} kg</strong></div>
              </div>
            </div>`
        }
      </div>

      <!-- RECOMENDAÇÕES -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">

                <div style="min-width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0">${i+1}</div>

          <div class="space-y-2">
            ${recsTreino.map((r,i)=>`

                <div style="min-width:24px;height:24px;background:var(--orange);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0">${i+1}</div>

    <!-- BOTÃO PDF FINAL -->

      <div>

// GERAR PDF — PROJEÇÃO PESSOAL
// ============================================================
function gerarPDFProjecao(){
  const p=S.perfil||{};
  const c=me();
  const peso=S.pesos.length?S.pesos[0].peso:(p.peso||60);
  const alturaM=(p.altura||160)/100;
  const imc=(peso/(alturaM*alturaM)).toFixed(1);
  const tdee=calcTDEE(peso,p.altura||160,p.birthdate,p.sexo,p.atividade);
  const pesoIdeal=p.sexo==='F'?Math.max(38,45.5+2.3*((p.altura||160)-152.4)/2.54):Math.max(40,50+2.3*((p.altura||160)-152.4)/2.54);
  const diff=(peso-pesoIdeal).toFixed(1);
  const status=parseFloat(diff)>1?'acima':parseFloat(diff)<-1?'abaixo':'normal';
  const kgDiff=Math.abs(parseFloat(diff));
  const dist=[0.15,0.20,0.22,0.22,0.21];
  const age=p.birthdate?calcAge(p.birthdate):12;
  const {level}=getLevel(S.xp||0);
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const hoje=new Date();
  const kcalConsumed=S.refeicoes.filter(r=>r.feita).reduce((a,r)=>a+r.kcal,0);
  const kcalBurned=S.exercicios.reduce((a,e)=>a+e.kcal,0);

  const recsNutri = status==='acima'
    ? ['Reduza alimentos ultraprocessados e aumente vegetais e proteínas magras.','Inclua fibras nas refeicoes para aumentar saciedade.','Mantenha as refeicoes regulares, evitando pular o cafe da manha.','Prefira agua a sucos e refrigerantes. Meta: '+(p.waterGoal||8)+' copos/dia.','Continue firme! Os resultados acumulam com consistencia.']
    : status==='abaixo'
    ? ['Aumente a frequencia das refeicoes com alimentos nutritivos.','Inclua proteinas em todas as refeicoes.','Consuma lanches saudaveis entre as refeicoes.','Invista em alimentos ricos em nutrientes: abacate, banana, batata-doce.','Mantenha acompanhamento nutricional.']
    : ['Mantenha a rotina de alimentacao equilibrada.','Continue priorizando alimentos naturais e variados.','Hidrate-se bem e mantenha a atividade fisica.','Monitore seu peso semanalmente.','Parabens! Continue com os habitos saudaveis.'];

  const recsTreino = status==='acima'
    ? ['Inicie com 20-30 min de caminhada rapida diaria.','Adicione exercicios de resistencia 2x por semana.','Inclua atividades que voce goste.','Aumente a intensidade gradualmente.','Mantenha ao menos 150 min de atividade por semana.']
    : ['Pratique exercicios leves para fortalecer a musculatura.','Inclua exercicios de forca supervisionados.','Priorize atividades de baixo impacto.','Aumente o volume de treino gradualmente.','Descanse bem: o crescimento muscular ocorre no repouso.'];

  if(!window.jspdf){showToast('❌ Biblioteca PDF não carregada. Tente novamente.');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const W=doc.internal.pageSize.getWidth();

  // ---- HEADER ----
  doc.setFillColor(26,95,212);
  doc.rect(0,0,W,38,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.text('PulseFit',14,16);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.text('Vida Saudável na Juventude',14,23);
  doc.setFontSize(10);
  doc.setFont('helvetica','bold');
  doc.text('PLANO DE PROJECAO PERSONALIZADO — 5 MESES',14,31);
  doc.setTextColor(40,40,40);

  let y=46;

  // ---- INFO PESSOAL ----
  doc.setFillColor(234,240,251);
  doc.roundedRect(10,y,W-20,30,3,3,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.text('INFORMACOES PESSOAIS',14,y+8);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  const col1=[`Nome: ${p.nome||c?.nome||'--'}`,`Escola: ${p.escola||'--'}`,`Serie: ${p.serie||'--'}`];
  const col2=[`Idade: ${age} anos`,`Objetivo: ${p.objetivo||'--'}`,`Nivel: ${level.name}`];
  col1.forEach((t,i)=>doc.text(t,14,y+14+i*6));
  col2.forEach((t,i)=>doc.text(t,W/2,y+14+i*6));
  y+=36;

  // ---- DADOS FÍSICOS ----
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.setTextColor(26,95,212);
  doc.text('DADOS FISICOS',14,y);
  doc.setTextColor(40,40,40);
  y+=5;
  doc.setDrawColor(26,95,212);
  doc.setLineWidth(0.5);
  doc.line(14,y,W-14,y);
  y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  const fisicos=[
    [`Peso atual: ${peso} kg`,`Peso ideal estimado: ${pesoIdeal.toFixed(1)} kg`],
    [`IMC: ${imc}`,`Altura: ${p.altura||'--'} cm`],
    [`Calorias diarias estimadas (TDEE): ${tdee} kcal`,`Situacao: ${status==='normal'?'No intervalo saudavel':status==='acima'?diff+' kg acima do ideal':Math.abs(parseFloat(diff)).toFixed(1)+' kg abaixo do ideal'}`],
  ];
  fisicos.forEach(row=>{
    doc.text(row[0],14,y);
    doc.text(row[1],W/2,y);
    y+=7;
  });
  y+=4;

  // ---- PROJEÇÃO MENSAL ----
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.setTextColor(26,95,212);
  doc.text('PROJECAO MENSAL',14,y);
  doc.setTextColor(40,40,40);
  y+=5;
  doc.line(14,y,W-14,y);
  y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);

  if(status==='normal'){
    doc.setFillColor(240,253,244);
    doc.roundedRect(10,y,W-20,14,2,2,'F');
    doc.setTextColor(21,128,61);
    doc.text('Voce ja esta no intervalo saudavel! Foque em manter seus habitos.',14,y+5);
    doc.text('Continue monitorando regularmente e mantendo a atividade fisica.',14,y+11);
    doc.setTextColor(40,40,40);
    y+=20;
  } else {
    dist.forEach((pct,i)=>{
      const kg=(kgDiff*pct).toFixed(1);
      const acum=dist.slice(0,i+1).reduce((s,v)=>s+kgDiff*v,0).toFixed(1);
      const mesIdx=(hoje.getMonth()+i+1)%12;
      const pesoMes=(status==='acima'?peso-parseFloat(acum):peso+parseFloat(acum)).toFixed(1);
      doc.setFillColor(i%2===0?245:252,i%2===0?247:253,i%2===0?255:255);
      doc.rect(10,y-4,W-20,12,'F');
      doc.setFont('helvetica','bold');
      doc.text(`Mes ${i+1} — ${meses[mesIdx]}:`,14,y+2);
      doc.setFont('helvetica','normal');
      doc.text(`${status==='acima'?'Perder':'Ganhar'} ${kg} kg | Acumulado: ${acum} kg | Peso estimado: ${pesoMes} kg`,60,y+2);
      y+=12;
    });
    y+=4;
    doc.setFillColor(255,247,237);
    doc.roundedRect(10,y,W-20,14,2,2,'F');
    doc.setFont('helvetica','bold');
    doc.setTextColor(194,65,12);
    doc.text(`META FINAL (5 meses): Peso estimado ${(status==='acima'?peso-kgDiff:peso+kgDiff).toFixed(1)} kg`,14,y+5);
    doc.setTextColor(40,40,40);
    const atingir = status==='acima'?'Perder '+kgDiff.toFixed(1)+' kg':'Ganhar '+kgDiff.toFixed(1)+' kg';
    doc.setFont('helvetica','normal');
    doc.text('Objetivo: '+atingir+' de forma saudavel e gradual.',14,y+11);
    doc.setTextColor(40,40,40);
    y+=20;
  }

  // ---- NOVA PÁGINA: RECOMENDAÇÕES ----
  doc.addPage();
  doc.setFillColor(26,95,212);
  doc.rect(0,0,W,22,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');doc.setFontSize(12);
  doc.text('RECOMENDACOES PERSONALIZADAS',14,14);
  doc.setTextColor(40,40,40);
  y=32;

  // NUTRIÇÃO
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.setTextColor(26,95,212);
  doc.text('NUTRICAO — PLANO POR MES',14,y);
  doc.setTextColor(40,40,40);
  y+=5;doc.line(14,y,W-14,y);y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  recsNutri.forEach((r,i)=>{
    const wrapped=doc.splitTextToSize(`${i+1}. ${r}`,W-28);
    doc.setFillColor(i%2===0?245:252,i%2===0?247:253,255);
    doc.rect(10,y-4,W-20,wrapped.length*6+4,'F');
    doc.text(wrapped,14,y);
    y+=wrapped.length*6+4;
  });
  y+=6;

  // TREINO
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.setTextColor(247,115,22);
  doc.text('TREINO — PLANO POR MES',14,y);
  doc.setTextColor(40,40,40);
  y+=5;doc.setDrawColor(247,115,22);doc.line(14,y,W-14,y);y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  recsTreino.forEach((r,i)=>{
    const wrapped=doc.splitTextToSize(`${i+1}. ${r}`,W-28);
    doc.setFillColor(i%2===0?255:252,i%2===0?247:253,i%2===0?237:255);
    doc.rect(10,y-4,W-20,wrapped.length*6+4,'F');
    doc.text(wrapped,14,y);
    y+=wrapped.length*6+4;
  });
  y+=6;

  // ATIVIDADE ATUAL
  doc.setDrawColor(180,180,180);
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.setTextColor(26,95,212);
  doc.text('ATIVIDADE ATUAL',14,y);
  doc.setTextColor(40,40,40);
  y+=5;doc.line(14,y,W-14,y);y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  const ativAtual=[
    `Refeicoes registradas: ${S.refeicoes.length}`,
    `Calorias consumidas hoje: ${kcalConsumed} kcal`,
    `Calorias queimadas hoje: ${kcalBurned} kcal`,
    `Agua hoje: ${S.agua} copos (${S.agua*250} ml)`,
    `Exercicios hoje: ${S.exercicios.length}`,
    `XP acumulado: ${S.xp||0} pontos | Nivel: ${level.name}`,
    `Conquistas: ${S.badges.length} de ${ALL_BADGES.length}`,
  ];
  ativAtual.forEach(t=>{doc.text('• '+t,14,y);y+=7;});

  // ---- RODAPÉ ----
  const totalPages=doc.internal.getNumberOfPages();
  for(let pg=1;pg<=totalPages;pg++){
    doc.setPage(pg);
    const pageH=doc.internal.pageSize.getHeight();
    doc.setFillColor(240,244,255);
    doc.rect(0,pageH-14,W,14,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(7);
    doc.setTextColor(107,127,163);
    doc.text('PulseFit — Vida Saudável na Juventude | Gerado em '+new Date().toLocaleDateString('pt-BR'),14,pageH-6);
    doc.text('Pagina '+pg+' de '+totalPages,W-30,pageH-6);
  }

  const nomeArq='plano_projecao_'+(p.nome||c?.nome||'usuario').replace(/\s/g,'_')+'_'+hoje.toISOString().split('T')[0]+'.pdf';
  doc.save(nomeArq);
  showToast('📄 Plano de projeção baixado com sucesso!');
}

function confirmarExcluirAluno(alunoId, nomeAluno) {

  excluirAluno(alunoId, nomeAluno);
}

function excluirAluno(alunoId, nomeAluno) {
  // Remove state from localStorage
  try { localStorage.removeItem(userKey(alunoId)); } catch(e) {}
  // Remove from AUTH.contas
  const idx = AUTH.contas.findIndex(c => c.id === alunoId);
  if (idx !== -1) {
    AUTH.contas.splice(idx, 1);
    saveAuth();
  }
  showToast('✅ Aluno "' + nomeAluno + '" excluído com sucesso.');
  renderPage();
}

function gerarPDF(aluno, sAluno) {
  const d = aluno.dados || {};
  const pf = sAluno.perfil || {};
  const pesos = sAluno.pesos || [];
  const pesoAtual = pesos.length ? pesos[0].peso : (d.peso || '--');

  const refeicoes = sAluno.refeicoes || [];
  const exercicios = sAluno.exercicios || [];
  const kcal = refeicoes.filter(r=>r.feita).reduce((a,r)=>a+r.kcal,0);
  const burned = exercicios.reduce((a,e)=>a+e.kcal,0);
  const age = d.birthdate ? calcAge(d.birthdate) : '--';

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const linhas=[
    'PULSEFIT — COMBATENDO A OBESIDADE NOS JOVENS',
    'Relatório de Acompanhamento',
    '',
    'Aluno: '+aluno.nome,
    'Idade: '+age+(age!=='--'?' anos':''),
    'Série: '+(d.serie||'--'),
    'Escola: '+(d.escola||'--'),
    'Objetivo: '+(d.objetivo||pf.objetivo||'--'),
    'Data: '+new Date().toLocaleDateString('pt-BR'),
    '',
    'DADOS FÍSICOS',
    'Peso no cadastro: '+(d.peso||'--')+' kg',
    'Altura: '+(d.altura||'--')+' cm',
    'Peso atual: '+pesoAtual+' kg',
    '',
    'ATIVIDADE DE HOJE',
    'Calorias consumidas: '+kcal+' kcal',
    'Calorias queimadas: '+burned+' kcal',
    'Água: '+(sAluno.agua||0)+' copos',
    'Refeições registradas: '+refeicoes.length,
    'Exercícios: '+exercicios.length,
    '',
    'GAMIFICAÇÃO',
    'XP acumulado: '+xp,
    'Conquistas: '+(sAluno.badges||[]).length,
    '',
    'HISTÓRICO DE PESO',
    ...(pesos.length?pesos.slice(0,10).map(pw=>pw.data+': '+pw.peso+' kg'):['Nenhum registro.']),
  ];
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.text('PulseFit',14,18);
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  let y=30;
  linhas.forEach(linha=>{const t=doc.splitTextToSize(linha,180);t.forEach(tx=>{if(y>280){doc.addPage();y=20;}doc.text(tx,14,y);y+=7;});});
  doc.save('relatorio_'+aluno.nome.replace(/\s/g,'_')+'.pdf');
  showToast('📄 Relatório PDF baixado!');
}

// MELHORIAS VISUAIS E DE FLUXO PEDIDAS
// ============================================================
function getLevel(xp){
  const levels=[
    {min:0,name:'Iniciante',icon:'🌱',phrase:'Vamos iniciar uma rotina saudavel.'},
    {min:101,name:'Explorador',icon:'🧭',phrase:'Estamos criando habitos.'},
    {min:301,name:'Saudavel',icon:'💚',phrase:'Sua rotina esta ficando consistente.'},
    {min:701,name:'Elite',icon:'⚡',phrase:'Voce esta mantendo constancia.'},
    {min:1501,name:'Master Fit',icon:'🏆',phrase:'Referencia em rotina saudavel.'}
  ];
  let lv=levels[0],nx=levels[1];
  for(let i=levels.length-1;i>=0;i--){ if(xp>=levels[i].min){lv=levels[i];nx=levels[i+1]||null;break;} }
  const pct=nx?Math.min(100,(xp-lv.min)/(nx.min-lv.min)*100):100;
  return {level:{...lv,name:lv.icon+' '+lv.name},next:nx?{...nx,name:nx.icon+' '+nx.name}:null,pct,levels:levels.map(l=>({...l,name:l.icon+' '+l.name}))};
}

function exerciseIcon(nome,cat){
  const n=(nome||'').toLowerCase();
  if(n.includes('caminh')) return '🚶';
  if(n.includes('corr')) return '🏃';
  if(n.includes('bicic')||n.includes('cicl')) return '🚴';
  if(n.includes('fut')) return '⚽';
  if(n.includes('danc')||n.includes('danç')) return '🎵';
  if(n.includes('corda')) return '🪢';
  if(n.includes('along')||cat==='flexib') return '🧘';
  if(n.includes('nata')) return '🏊';
  return cat==='Exercicio Fisico'||cat==='massa'?'💪':'⭐';
}

    {max:18.5,label:'Atencao ao peso',color:'#1d4ed8',bg:'#eff6ff',border:'#bfdbfe',icon:'💙',desc:'Seu corpo pode precisar de mais nutricao.'},

    {max:30,label:'Atencao a saude',color:'#a16207',bg:'#fefce8',border:'#fde68a',icon:'💛',desc:'Pequenos ajustes de habito ajudam muito.'},
    {max:35,label:'Vamos melhorar juntos',color:'#c2410c',bg:'#fff7ed',border:'#fed7aa',icon:'🧡',desc:'Rotina, apoio e acompanhamento fazem diferenca.'},
    {max:Infinity,label:'Atencao a saude',color:'#dc2626',bg:'#fef2f2',border:'#fecaca',icon:'❤️',desc:'Procure orientacao profissional e siga com cuidado.'}
  ];
  const zone=imc?IMC_ZONES.find(z=>parseFloat(imc)<z.max):null;
  const imcPct=imc?Math.min(100,Math.max(0,((parseFloat(imc)-13)/(40-13))*100)):0;
  const histHTML=S.pesos.length===0?'<p class="text-sm text-muted text-center" style="padding:20px">Nenhum peso registrado ainda.</p>':S.pesos.map((pw,i)=>`<div class="history-item"><div><span style="font-weight:700">${pw.peso} kg</span><span class="text-xs text-muted" style="margin-left:8px">${pw.data}</span></div><button class="del-btn" onclick="removePeso(${i})">🗑</button></div>`).join('');
  el.innerHTML=`
    <div class="page-title"><div><h1>Minha <span class="text-primary">Evolucao</span></h1><p class="text-xs text-muted">Saude, habitos e bem-estar</p></div><button class="btn btn-primary" onclick="openModal('modal-peso');document.getElementById('p-data').value=new Date().toISOString().split('T')[0]">+ Peso</button></div>
    <div class="grid3"><div class="card"><div style="font-size:1.3rem">⚖️</div><div style="font-weight:700;font-size:1.5rem;margin-top:4px">${pesoAtual?pesoAtual+'kg':'--'}</div><div class="text-xs text-muted">peso atual</div></div><div class="card"><div style="font-size:1.3rem">🎯</div><div style="font-weight:700;font-size:1.5rem;margin-top:4px">${p.pesoMeta?p.pesoMeta+'kg':'--'}</div><div class="text-xs text-muted">peso meta</div></div><div class="card" ${zone?'style="background:'+zone.bg+';border-color:'+zone.border+'"':''}><div style="font-size:1.3rem">${zone?zone.icon:'📐'}</div><div style="font-weight:700;font-size:1.5rem;margin-top:4px;color:${zone?zone.color:'#1a2340'}">${imc||'--'}</div><div class="text-xs text-muted">IMC</div>${zone?'<div style="font-size:.68rem;font-weight:700;color:'+zone.color+'">'+zone.label+'</div>':''}</div></div>
    <div class="grid2 mt-4"><div class="card"><div class="card-title">Indicador IMC</div><div class="imc-gradient">${imc?'<div class="imc-pointer" style="left:'+imcPct+'%"></div>':''}</div><div class="flex justify-between" style="font-size:.65rem;color:var(--muted-fg);margin-bottom:12px"><span>Baixo</span><span>Saudavel</span><span>Atencao</span><span>Melhorar juntos</span></div>${zone?'<div style="background:'+zone.bg+';border:1px solid '+zone.border+';border-radius:12px;padding:10px;margin-bottom:12px"><div style="font-weight:700;font-size:.85rem;color:'+zone.color+'">'+zone.icon+' '+zone.label+'</div><p class="text-xs text-muted mt-1">'+zone.desc+'</p></div>':''}<div class="card-title">Historico de peso</div><div class="overflow-y-auto">${histHTML}</div></div><div class="card"><div class="card-title">Evolucao holistica</div>${[{label:'Refeicoes',val:S.refeicoes.length,max:10,color:'#4ade80',icon:'🥗'},{label:'Agua',val:S.agua,max:p.waterGoal||8,color:'#60a5fa',icon:'💧'},{label:'Exercicios',val:S.exercicios.length,max:5,color:'#fb923c',icon:'🏃'},{label:'XP de rotina',val:S.xp||0,max:1500,color:'#c084fc',icon:'⭐'}].map(item=>`<div class="mb-3"><div class="flex justify-between items-center mb-1"><span style="font-size:.8rem;font-weight:600">${item.icon} ${item.label}</span><span class="text-xs text-muted">${item.val} / ${item.max}</span></div><div class="progress-track"><div class="progress-fill" style="width:${Math.min(100,item.val/item.max*100)}%;background:${item.color}"></div></div></div>`).join('')}</div></div>`;
}

loadAuth();
document.getElementById('p-data').value = new Date().toISOString().split('T')[0];

if (AUTH.logado && me()) {
  loadState();
  iniciarApp();
} else {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  renderLogin();
}
</script>
